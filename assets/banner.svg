<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a9d8f">
        <animate attributeName="stop-color" values="#2a9d8f; #264653; #2a9d8f" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#e9c46a">
        <animate attributeName="stop-color" values="#e9c46a; #f4a261; #e9c46a" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <style>
      .title { font: bold 36px sans-serif; fill: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
      .subtitle { font: 20px sans-serif; fill: #f0f0f0; }
      .leaf { animation: float 3s ease-in-out infinite; transform-origin: center; }
      @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(5deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
    </style>
  </defs>
  <rect width="800" height="200" rx="15" ry="15" fill="url(#bg)" />
  <text x="50%" y="45%" text-anchor="middle" class="title">Carbon-Capture Bio-Architect</text>
  <text x="50%" y="65%" text-anchor="middle" class="subtitle">Interview Questions &amp; Guide 🌿🔬</text>
  <g class="leaf" transform="translate(80, 100)">
    <path d="M0,0 C10,-20 30,-20 40,0 C30,20 10,20 0,0" fill="#457b9d" stroke="white" stroke-width="2"/>
  </g>
  <g class="leaf" transform="translate(680, 80) scale(1.5)">
    <path d="M0,0 C10,-20 30,-20 40,0 C30,20 10,20 0,0" fill="#e76f51" stroke="white" stroke-width="2"/>
  </g>
</svg>
